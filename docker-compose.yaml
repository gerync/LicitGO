name: "licitgo"
version: '1.0'
services:
  server:
    build:
      context: ./server
      dockerfile: dockerfile
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "15000:15000"
  db:
    image: mysql:latest
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_DATABASE: licitgo
      MYSQL_USER: root
      MYSQL_PASSWORD: ""
    ports:
      - 3306:3306
    volumes:
      - db_data:/var/lib/mysql
      - ./server/setup.sql:/docker-entrypoint-initdb.d/setup.sql:ro
  client:
    build:
      context: ./client
      dockerfile: dockerfile
    depends_on:
      - server
    ports:
      - 80:80
    restart: unless-stopped
    
volumes:
  db_data: