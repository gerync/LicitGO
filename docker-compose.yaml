name: "licitgo"
version: '1.0'
services:
  server:
    build:
      context: ./server
      dockerfile: dockerfile
    environment:
      DBHOST: db
      DBUSER: licitgo
      DBPASS: licitgo
      DBNAME: licitgo
      DBPORT: 3306
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "15000:15000"
    # No bind-mount for exchange directory to keep container-managed files
  db:
    image: mariadb:latest
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: licitgo
      MYSQL_USER: licitgo
      MYSQL_PASSWORD: licitgo
    ports:
      - 3306:3306
    volumes:
      - db_data:/var/lib/mysql:Z
      - ./server/setup.sql:/docker-entrypoint-initdb.d/setup.sql:ro,Z
  client:
    build:
      context: ./client
      dockerfile: dockerfile
      args:
        VITE_API_URL: "https://api.licitgo.com"
    depends_on:
      - server
    ports:
      - "8080:80"
    restart: unless-stopped
    
volumes:
  db_data: